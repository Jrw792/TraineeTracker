<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fafafb" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#07070a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Training Program</title>

  <!-- Pre-paint theme bootstrap (prevents flash of wrong theme) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('tp-theme');
        var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var effective = t || (sysDark ? 'dark' : 'light');
        if (t) document.documentElement.setAttribute('data-theme', t);
        document.documentElement.setAttribute('data-effective-theme', effective);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#/" class="brand" aria-label="Home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">Training&nbsp;Program</span>
      </a>
      <div class="header-right">
        <nav aria-label="Main">
          <a href="#/" data-route="home">Roster</a>
          <a href="#/sessions" data-route="sessions">Sessions</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <main id="app" class="container" role="main"></main>
  <footer class="site-footer">
    <div class="container">
      <span id="last-updated">—</span>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
